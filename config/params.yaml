# ============================================================
# Central experiment configuration (edit here, not in code).
# Loaded by lib/utils/config.py -> available everywhere.
# Keeping all "magic numbers" here is the MATLAB-script habit:
# one place to tune, reproducible runs.
# ============================================================

simulation:
  dt: 0.001          # [s] integrator fixed step
  t_final: 5.0       # [s] total simulation time
  integrator: rk4    # rk4 | rk45

# Which plant to control. The robot is one plant among many; the state-space
# examples (lib/systems/examples.py) need no Pinocchio.
plant:
  type: robot        # robot | double_integrator | mass_spring_damper | cart_pole
  mass_spring_damper: { m: 1.0, k: 1.0, c: 0.2 }              # [kg], [N/m], [N*s/m]
  cart_pole: { m_cart: 1.0, m_pole: 0.1, length: 0.5, gravity: 9.81 }

robot:
  # Path is relative to the project root.
  urdf: models/double_pendulum.urdf
  gravity: [0.0, 0.0, -9.81]   # [m/s^2]

initial_state:
  q: [0.5, 0.0]      # [rad] joint positions (robot plant)
  v: [0.0, 0.0]      # [rad/s] joint velocities (robot plant)
  x: [1.0, 0.0]      # full state x0 for a state-space plant (plant.type != robot)

controller:
  type: computed_torque   # pid | computed_torque | lqr | none

  pid:
    kp: [40.0, 40.0]
    ki: [0.0, 0.0]
    kd: [8.0, 8.0]
    u_max: 50.0        # [N*m] saturation (anti-windup)

  computed_torque:
    kp: [100.0, 100.0]
    kd: [20.0, 20.0]

  lqr:
    Q_diag: [10.0, 10.0, 1.0, 1.0]   # state weights [q, v]  (robot plant)
    R_diag: [0.1, 0.1]               # input weights         (robot plant)

  # LQR weights used when plant.type != robot (design on the linearized plant).
  # Sizes must match the chosen plant's nx / nu (default sized for the 2-state
  # double_integrator / mass_spring_damper).
  state_lqr:
    Q_diag: [10.0, 1.0]
    R_diag: [0.1]

reference:
  q_des: [0.0, 0.0]   # [rad] setpoint (robot regulation task)
  x_des: [0.0, 0.0]   # state-space setpoint (used when plant.type != robot)

output:
  save_data: true
  save_figures: true
