# ============================================================
# Central experiment configuration (edit here, not in code).
# Loaded by lib/utils/config.py -> available everywhere.
# Keeping all "magic numbers" here is the MATLAB-script habit:
# one place to tune, reproducible runs.
# ============================================================

simulation:
  dt: 0.001          # [s] integrator fixed step
  t_final: 5.0       # [s] total simulation time
  integrator: rk4    # rk4 | rk45

robot:
  # Path is relative to the project root.
  urdf: models/double_pendulum.urdf
  gravity: [0.0, 0.0, -9.81]   # [m/s^2]

initial_state:
  q: [0.5, 0.0]      # [rad] joint positions
  v: [0.0, 0.0]      # [rad/s] joint velocities

controller:
  type: computed_torque   # pid | computed_torque | lqr | none

  pid:
    kp: [40.0, 40.0]
    ki: [0.0, 0.0]
    kd: [8.0, 8.0]
    u_max: 50.0        # [N*m] saturation (anti-windup)

  computed_torque:
    kp: [100.0, 100.0]
    kd: [20.0, 20.0]

  lqr:
    Q_diag: [10.0, 10.0, 1.0, 1.0]   # state weights [q, v]
    R_diag: [0.1, 0.1]               # input weights

reference:
  q_des: [0.0, 0.0]   # [rad] setpoint (regulation task)

output:
  save_data: true
  save_figures: true
