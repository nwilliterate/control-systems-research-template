name: tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      # `uv sync` (no `--extra dynamics`) installs the pure-numpy scientific stack
      # plus the dev group — but NOT Pinocchio. The Pinocchio-dependent tests
      # (tests/test_sim.py) skip automatically when it is absent, so this job
      # verifies the OS-independent core on every push.
      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -q

      # Reject any knowledge/claims/ atom that isn't traceable to a real source
      # (missing/unknown BibTeX cite, no verbatim quote, broken supersede link, …).
      - name: Verify knowledge store
        run: uv run python scripts/verify_knowledge.py
