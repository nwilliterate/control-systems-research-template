# Conda environment for the robot-control research template.
# Pinocchio is distributed reliably through conda-forge (recommended on all OS,
# and required on Windows where the PyPI wheel is unavailable).
#
#   conda env create -f environment.yml
#   conda activate robot-control
#
name: robot-control
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7
  - pyyaml>=6.0
  - pinocchio>=2.7      # rigid-body dynamics (Featherstone ABA, RNEA, CRBA)
  - example-robot-data  # optional: ready-made URDFs (panda, ur5, ...)
  - control>=0.9.4      # python-control: LQR, pole placement, state-space
  - cvxpy>=1.4          # convex optimization: LMI/SDP, convex (linear) MPC
  - sympy>=1.12         # symbolic state-space derivation / Jacobian cross-checks
  - casadi>=3.6         # nonlinear MPC / autodiff (optimal control)
  - slycot>=0.5         # python-control MIMO backend (place, care, hinfsyn)
  - spyder>=5.4         # MATLAB-like IDE
  - pytest>=7.0
  - pip
